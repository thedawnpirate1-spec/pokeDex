<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script defer src="script.js"></script>
    <link href="./styles/mainStyle.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="./images/icons/favIcon.png">
    <script defer src="./scripts/template.js"></script>
    <script defer src="./scripts/dialog.js"></script>
    <link rel="stylesheet" href="./styles/cardStyle.css">
</head>

<body onload="init()">
    <header>
        <div class="maxSize">
            <div class="headerDiv">
                <div class="headerImgDiv">
                    <img src="./assets/images/Pokedex_Logo.png" alt="Pokemondex logo">
                </div>
                <div class="searchDiv">
                    <input id="searchBar" type="text">
                    <button onclick="dexSearch()">search now</button>
                </div>
            </div>
        </div>
    </header>
    <main class="mainStyle">
        <img src="./assets/images/master_ball_background.png" alt="master ball background">
        <div class="maxSize">
            <section id="mainContent" class="content">

            </section>
        </div>
        <dialog id="dialogFunction" onclick="closeDialog()" open="">
            <div id="dialogContent" onclick=" protectionCloseDialog(event)">
                
            </div>
        </dialog>

    </main>
    <footer>
        <div class="maxSize">
            <div class="footerContent">
                <img src="" alt="" srcset="">
                <span>impressum</span>
            </div>
        </div>
    </footer>
</body>

</html>
