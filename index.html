<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script defer src="script.js"></script>
    <link rel="stylesheet" href="./styles/mainStyle.css">
    <link rel="stylesheet" href="./styles/cardStyle.css">
    <link rel="stylesheet" href="./styles/dialogStyle.css">
    <link rel="icon" type="image/x-icon" href="./assets/images/Master Ball-Design als Favicon.png">
    <script defer src="./scripts/template.js"></script>
    <script defer src="./scripts/dialog.js"></script>
    
</head>

<body onload="init()">
    <header>
        <div class="maxSize">
            <div class="headerDiv">
                <div class="headerImgDiv">
                    <img src="./assets/images/Pokedex_Logo.png" alt="Pokemondex logo">
                </div>
                <div class="searchDiv">
                    <input id="searchBar" type="text">
                    <button onclick="dexSearch()">search now</button>
                </div>
            </div>
        </div>
    </header>
    <main class="mainStyle">
        <div class="maxSize">
            <section id="mainContent" class="content">

            </section>
        </div>
<dialog id="dialogFunction" onclick="closeDialog()">
            <div id="dialogContent" onclick=" protectionCloseDialog(event)">
                
            </div>
        </dialog>
    </main>
    <section class="low">
        <button class="loadBtn" onclick="loadMore()">lade neue pokemon</button>
    </section>
    <footer>
        <div class="maxSize">
            <div class="footerContent">
                <img src="./assets/images/Pokedex_Logo.png" alt="pokedex logo">
                <span>impressum</span>
            </div>
        </div>
    </footer>
</body>
        


</html>
